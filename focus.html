<!DOCTYPE html>
<html lang="ja" data-theme="kinari">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>集中 | 風雅舎</title>
  <meta name="description" content="時計とポモドーロタイマー、やることリストをひとつにした集中のためのページ。データはブラウザの中にだけ保存されます。">
  <meta property="og:title" content="集中 | 風雅舎">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://aimeeta.github.io/fugasha_ai/focus.html">
  <meta property="og:image" content="https://aimeeta.github.io/fugasha_ai/ogp.jpg">
  <meta property="og:locale" content="ja_JP">
  <meta property="og:site_name" content="風雅舎">
  <meta name="theme-color" content="#f0e6d6" id="metaTheme">
  <link rel="canonical" href="https://aimeeta.github.io/fugasha_ai/focus.html">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #f0e6d6;
      --bg2:     #e8dcc8;
      --fg:      #0d2030;
      --fg2:     #1e3a50;
      --hint:    #5f646c;
      --accent:  #e8866a;
      --accent2: #f0a882;
      --accent-ink: #7a4025;
      --line:    rgba(13,32,48,.1);
      --panel:   #f4ecdf;
      --shadow:  rgba(13,32,48,.14);
      --font-sans:  'Zen Kaku Gothic New', sans-serif;
      --font-serif: 'Noto Serif JP', serif;
      --font-mono: ui-monospace, 'SF Mono', 'Cascadia Mono', Menlo, Consolas, 'Liberation Mono', monospace;
      --ease: cubic-bezier(.16,1,.3,1);
      --clock-font: var(--font-serif);
    }
    [data-theme="yoi"] {
      --bg:      #0d2030;
      --bg2:     #14293d;
      --fg:      #f0e6d6;
      --fg2:     #d9cfba;
      --hint:    #b4ad9d;
      --accent:  #f0a882;
      --accent2: #ffcf9e;
      --accent-ink: #f0a882;
      --line:    rgba(240,230,214,.16);
      --panel:   #122638;
      --shadow:  rgba(0,0,0,.4);
    }
    /* koke/kasumiは近似色だったため、koke=緑がかった暖色寄り／kasumi=青灰寄りに差別化（意匠デビル批評対応） */
    [data-theme="koke"] {
      --bg:      #e3e8d6;
      --bg2:     #d8ddc9;
      --fg:      #1a2618;
      --fg2:     #2e3a28;
      --hint:    #576048;
      --accent:  #c9805a;
      --accent2: #e0a06a;
      --accent-ink: #6b4025;
      --line:    rgba(26,38,22,.14);
      --panel:   #eaece0;
      --shadow:  rgba(26,38,22,.17);
    }
    [data-theme="kasumi"] {
      --bg:      #e6e7ea;
      --bg2:     #dadde2;
      --fg:      #26282e;
      --fg2:     #3c3f47;
      --hint:    #61646b;
      --accent:  #e8866a;
      --accent2: #f0a882;
      --accent-ink: #7a4025;
      --line:    rgba(38,40,55,.13);
      --panel:   #ecedf0;
      --shadow:  rgba(38,40,46,.16);
    }
    [data-clock-font="sans"] { --clock-font: var(--font-sans); }
    [data-clock-font="mono"] { --clock-font: var(--font-mono); }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
    html, body { height: 100%; }
    body {
      font-family: var(--font-sans); background: var(--bg); color: var(--fg);
      transition: background .4s, color .4s;
      overflow-x: hidden;
    }
    a { color: inherit; }
    ::selection { background: rgba(232,134,106,.3); color: var(--fg); }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    button { font-family: var(--font-sans); color: inherit; }

    .nav {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; justify-content: space-between; align-items: center;
      padding: calc(env(safe-area-inset-top) + 20px) 48px 20px;
    }
    .nav-logo { font-size: 13px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; text-decoration: none; }
    .nav-right { display: flex; align-items: center; gap: 32px; }
    .nav-link { font-size: 11px; color: var(--hint); letter-spacing: .1em; transition: color .2s; text-decoration: none; text-transform: uppercase; font-weight: 500; }
    .nav-link:hover { color: var(--fg); }
    @media (max-width: 768px) { .nav { padding-left: 20px; padding-right: 20px; } .nav-right { gap: 18px; } }

    /* ---- 舞台 ---- */
    .stage {
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; gap: 0;
      padding: calc(env(safe-area-inset-top) + 84px) 24px calc(env(safe-area-inset-bottom) + 104px);
    }
    .st-date {
      font-family: var(--font-mono); font-size: 12px; letter-spacing: .22em;
      color: var(--hint); text-transform: uppercase;
    }
    .st-clock {
      font-family: var(--clock-font); font-weight: 300;
      font-size: clamp(64px, 17vw, 164px); line-height: 1.15;
      font-variant-numeric: tabular-nums; letter-spacing: .02em;
      color: var(--fg); margin: 4px 0 8px;
    }
    .st-clock .sec { font-size: .38em; color: var(--hint); font-variant-numeric: tabular-nums; margin-left: .12em; transition: color .6s ease; }
    /* 音楽再生中は秒表示の色だけをわずかに変化させる（BPM同期のような偽装はしない） */
    .music-active .st-clock .sec { color: var(--accent-ink); }
    /* Zen Kaku GothicとJetBrains系は300を読み込んでいないため、疑似細字を避け400を使う */
    [data-clock-font="sans"] .st-clock,
    [data-clock-font="mono"] .st-clock { font-weight: 400; }

    /* ---- ポモドーロ ---- */
    .pomo { display: flex; flex-direction: column; align-items: center; gap: 14px; margin-top: 8px; }
    .pomo-tabs {
      display: inline-flex; border: 1px solid var(--line); border-radius: 2px; overflow: hidden;
      background: color-mix(in srgb, var(--bg2) 55%, transparent);
    }
    .pomo-tab {
      font-size: 11px; letter-spacing: .1em; text-transform: uppercase; font-weight: 500;
      padding: 11px 18px; min-height: 44px; background: transparent; border: none; cursor: pointer;
      color: var(--hint); transition: color .2s, background .2s;
    }
    .pomo-tab[aria-pressed="true"] { background: var(--fg); color: var(--bg); }
    .pomo-tab:hover:not([aria-pressed="true"]) { color: var(--fg); }
    .pomo-ring-wrap {
      position: relative; display: flex; align-items: center; justify-content: center;
      width: clamp(172px, 32vw, 232px); height: clamp(172px, 32vw, 232px);
    }
    .pomo-ring { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
    .pomo-ring-track { fill: none; stroke: var(--line); stroke-width: 2.5; }
    .pomo-ring-fill {
      fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round;
      transition: stroke-dashoffset .25s linear, stroke .3s;
    }
    .pomo-time {
      position: relative; z-index: 1;
      font-family: var(--font-mono); font-size: clamp(36px, 8vw, 56px);
      font-variant-numeric: tabular-nums; letter-spacing: .04em; line-height: 1.2; color: var(--fg2);
    }
    .pomo-time.done-pulse { animation: pulse 1s var(--ease) 2; }
    @keyframes pulse { 0%,100% { color: var(--fg2); } 50% { color: var(--accent); } }
    .pomo-time.start-breathe { animation: breathe .42s var(--ease); }
    @keyframes breathe { 0% { transform: scale(1); } 45% { transform: scale(1.045); } 100% { transform: scale(1); } }
    .pomo-ctrl { display: flex; gap: 10px; }
    .btn-amber {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px; font-size: 12px;
      padding: 13px 26px; min-height: 44px; border-radius: 2px; background: var(--accent); color: #0d2030;
      cursor: pointer; font-weight: 500; border: none; letter-spacing: .1em;
      transition: opacity .25s; text-transform: uppercase; text-decoration: none;
    }
    .btn-amber:hover { opacity: .8; }
    .btn-ghost {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px; font-size: 12px;
      padding: 12px 25px; min-height: 44px; border-radius: 2px; background: transparent; color: var(--fg);
      border: 1px solid var(--line); cursor: pointer; font-weight: 500;
      letter-spacing: .1em; text-transform: uppercase; text-decoration: none; transition: border-color .2s;
    }
    .btn-ghost:hover { border-color: var(--hint); }
    .btn-amber svg, .btn-ghost svg { width: 16px; height: 16px; }

    .pomo-task {
      font-size: 13px; color: var(--fg2); line-height: 1.8; max-width: 520px;
      padding: 0 8px; overflow-wrap: anywhere;
    }
    .pomo-task .lbl { color: var(--hint); font-size: 12px; }
    .pomo-task .none { color: var(--hint); font-size: 12px; }

    /* ---- ことば ---- */
    .msg-wrap { display: flex; align-items: center; gap: 10px; margin-top: 32px; max-width: 520px; }
    .msg-col { display: flex; flex-direction: column; gap: 5px; }
    .msg {
      font-family: var(--font-serif); font-weight: 300; font-feature-settings: 'palt' 1;
      font-size: 15px; line-height: 2; color: var(--fg2);
      opacity: 1; transition: opacity .4s ease;
    }
    .msg.fading { opacity: 0; }
    .msg-author {
      font-family: var(--font-mono); font-size: 11px; letter-spacing: .06em; color: var(--hint);
      opacity: 1; transition: opacity .4s ease; min-height: 1em;
    }
    .msg-author.fading { opacity: 0; }
    .msg-next {
      flex: none; width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: 1px solid var(--line); border-radius: 50%; cursor: pointer;
      color: var(--hint); transition: color .2s, border-color .2s, transform .4s var(--ease);
    }
    .msg-next:hover { color: var(--fg); border-color: var(--hint); transform: rotate(180deg); }
    .msg-next svg { width: 16px; height: 16px; }

    /* ---- 下部の操作 ---- */
    .corner {
      position: fixed; bottom: calc(env(safe-area-inset-bottom) + 20px); z-index: 10;
      display: flex; align-items: center; gap: 10px;
    }
    .corner-l { left: max(env(safe-area-inset-left), 20px); }
    .corner-r { right: max(env(safe-area-inset-right), 20px); }
    .theme-dot {
      width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
      border: 1px solid var(--line); padding: 0;
      transition: transform .2s var(--ease), box-shadow .2s;
    }
    .theme-dot:hover { transform: scale(1.15); }
    .theme-dot[aria-pressed="true"] { box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent); }
    .btn-tasks {
      display: inline-flex; align-items: center; gap: 10px; font-size: 11px;
      padding: 12px 20px; min-height: 44px; border-radius: 2px;
      background: color-mix(in srgb, var(--panel) 88%, transparent); color: var(--fg);
      border: 1px solid var(--line); cursor: pointer; font-weight: 500;
      letter-spacing: .12em; text-transform: uppercase; transition: border-color .2s;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .btn-tasks:hover { border-color: var(--hint); }
    .btn-tasks svg { width: 15px; height: 15px; }
    .btn-tasks .cnt { font-family: var(--font-mono); font-size: 10px; color: var(--accent-ink); }

    /* ---- タスクパネル ---- */
    .backdrop {
      position: fixed; inset: 0; z-index: 40; background: rgba(13,32,48,.35);
      opacity: 0; pointer-events: none; transition: opacity .35s;
    }
    .backdrop.open { opacity: 1; pointer-events: auto; }
    .panel {
      position: fixed; z-index: 50; background: var(--panel);
      display: flex; flex-direction: column;
      box-shadow: 0 8px 48px var(--shadow);
      top: 0; right: 0; bottom: 0; width: min(380px, 92vw);
      transform: translateX(105%); transition: transform .45s var(--ease);
      padding-top: env(safe-area-inset-top);
    }
    .panel.open { transform: translateX(0); }
    @media (max-width: 640px) {
      .panel {
        top: auto; left: 0; right: 0; bottom: 0; width: 100%;
        max-height: 80vh; max-height: 80dvh;
        border-radius: 10px 10px 0 0; padding-top: 0;
        transform: translateY(105%);
      }
      .panel.open { transform: translateY(0); }
    }
    .panel-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 22px 14px; border-bottom: 1px solid var(--line); flex: none;
    }
    .panel-title { font-family: var(--font-serif); font-weight: 400; font-feature-settings: 'palt' 1; font-size: 17px; }
    /* やることリストは実務的な機能のため、情緒的な明朝ではなくゴシックに */
    #panel .panel-title { font-family: var(--font-sans); font-weight: 500; font-feature-settings: normal; }
    .panel-close {
      width: 44px; height: 44px; margin: -10px -12px -10px 0;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: none; cursor: pointer; color: var(--hint); transition: color .2s;
    }
    .panel-close:hover { color: var(--fg); }
    .panel-close svg { width: 18px; height: 18px; }
    .panel-add { display: flex; gap: 8px; padding: 16px 22px 8px; flex: none; }
    .panel-add input {
      flex: 1; min-width: 0; font-family: var(--font-sans); font-size: 14px;
      padding: 11px 12px; min-height: 44px; border: 1px solid var(--line); border-radius: 2px;
      background: var(--bg); color: var(--fg);
    }
    .panel-add input::placeholder { color: var(--hint); }
    .panel-add .btn-amber { padding: 11px 16px; }
    .panel-tools { display: flex; justify-content: flex-end; padding: 8px 22px; flex: none; }
    .toggle-done {
      font-size: 11px; color: var(--hint); background: transparent; border: none; cursor: pointer;
      padding: 8px 2px; letter-spacing: .04em; transition: color .2s; min-height: 36px;
    }
    .toggle-done:hover { color: var(--fg); }
    .task-list { list-style: none; overflow-y: auto; flex: 1; padding: 2px 14px calc(env(safe-area-inset-bottom) + 20px); overscroll-behavior: contain; }
    .task-empty { font-size: 13px; color: var(--hint); line-height: 2; padding: 22px 10px; text-align: center; }
    .task {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 6px 8px 10px; border-radius: 2px; border-left: 2px solid transparent;
      transition: background .2s, border-color .2s;
    }
    .task:hover { background: var(--bg2); }
    .task.is-focus { border-left-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }
    .t-check {
      flex: none; width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: none; cursor: pointer; color: var(--hint);
    }
    .t-check .box {
      width: 17px; height: 17px; border: 1.5px solid var(--hint); border-radius: 2px;
      display: inline-flex; align-items: center; justify-content: center; transition: background .2s, border-color .2s;
    }
    .t-check .box svg { width: 11px; height: 11px; opacity: 0; color: var(--bg); transition: opacity .2s; }
    .t-check .box svg path { stroke-dasharray: 20; stroke-dashoffset: 0; }
    .t-check .box svg path.draw-in { animation: checkDraw .3s var(--ease); }
    @keyframes checkDraw { from { stroke-dashoffset: 20; } to { stroke-dashoffset: 0; } }
    .task.is-done .t-check .box { background: var(--hint); border-color: var(--hint); }
    .task.is-done .t-check .box svg { opacity: 1; }
    .t-body { flex: 1; min-width: 0; text-align: left; }
    .t-name { display: block; font-size: 14px; line-height: 1.6; overflow-wrap: anywhere; }
    .task.is-done .t-name { color: var(--hint); text-decoration: line-through; }
    .t-meta { display: block; font-family: var(--font-mono); font-size: 10px; letter-spacing: .06em; color: var(--accent-ink); margin-top: 1px; }
    .t-edit-input {
      width: 100%; font-family: var(--font-sans); font-size: 14px; padding: 6px 8px;
      border: 1px solid var(--accent); border-radius: 2px; background: var(--bg); color: var(--fg);
    }
    .t-act {
      flex: none; width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: none; cursor: pointer; color: var(--hint); border-radius: 2px;
      transition: color .2s;
    }
    .t-act:hover { color: var(--fg); }
    .t-act svg { width: 16px; height: 16px; }
    .t-focus-btn[aria-pressed="true"] { color: var(--accent-ink); }

    /* ---- 通知 ---- */
    .notice {
      position: fixed; top: calc(env(safe-area-inset-top) + 16px); left: 50%; z-index: 60;
      transform: translate(-50%, -16px); opacity: 0; pointer-events: none;
      background: var(--fg); color: var(--bg);
      font-size: 13px; line-height: 1.7; padding: 14px 20px 14px 17px; border-radius: 8px;
      border-left: 3px solid var(--accent);
      display: flex; align-items: center; gap: 14px; max-width: min(480px, calc(100vw - 32px));
      box-shadow: 0 8px 32px var(--shadow);
      transition: opacity .4s, transform .4s var(--ease);
    }
    .notice.show { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }
    .notice button {
      background: transparent; border: none; color: inherit; opacity: .7; cursor: pointer;
      font-size: 12px; letter-spacing: .08em; padding: 6px; min-height: 32px;
    }
    .notice button:hover { opacity: 1; }

    /* ---- 背景レイヤー ---- */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0; overflow: hidden;
      background: var(--bg); transition: background .4s;
    }
    .bg-media { position: absolute; inset: 0; }
    .bg-media img, .bg-media video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .bg-layer::after {
      content: ''; position: absolute; inset: 0; background: var(--bg);
      opacity: 1; transition: opacity .5s ease, background .4s; pointer-events: none;
    }
    [data-bg-kind="preset"] .bg-layer::after { opacity: .18; }
    [data-bg-kind="custom"] .bg-layer::after { opacity: .62; }
    .bg-preset { position: absolute; inset: 0; }
    .p-mist {
      background:
        radial-gradient(ellipse at 28% 22%, color-mix(in srgb, var(--accent) 20%, transparent), transparent 60%),
        radial-gradient(ellipse at 76% 82%, color-mix(in srgb, var(--fg2) 16%, transparent), transparent 58%),
        radial-gradient(ellipse at 50% 45%, color-mix(in srgb, var(--bg2) 45%, transparent), transparent 75%),
        var(--bg);
      background-blend-mode: normal, normal, soft-light, normal;
      animation: driftMist 28s ease-in-out infinite alternate;
    }
    .p-fire {
      background:
        radial-gradient(circle at 50% 120%, color-mix(in srgb, var(--accent) 60%, transparent), transparent 45%),
        radial-gradient(circle at 50% 130%, color-mix(in srgb, var(--accent2) 35%, transparent), transparent 60%),
        var(--bg);
      transform-origin: 50% 100%;
      animation: emberGlow 4.5s ease-in-out infinite;
    }
    .p-water {
      background:
        linear-gradient(120deg,
          color-mix(in srgb, var(--fg2) 12%, var(--bg)),
          var(--bg2),
          color-mix(in srgb, var(--accent) 10%, var(--bg))),
        linear-gradient(210deg,
          transparent,
          color-mix(in srgb, var(--bg2) 35%, transparent) 50%,
          transparent);
      background-size: 220% 220%, 170% 170%;
      animation: waterFlow 32s ease-in-out infinite;
    }
    @keyframes driftMist { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-3%, 2%) scale(1.06); } }
    @keyframes emberGlow {
      0%, 100% { opacity: .7; transform: scaleY(1); }
      50% { opacity: 1; transform: scaleY(1.03); }
    }
    @keyframes waterFlow {
      0%   { background-position: 0% 50%, 100% 0%; }
      50%  { background-position: 100% 50%, 30% 100%; }
      100% { background-position: 0% 50%, 100% 0%; }
    }
    @media (prefers-reduced-motion: reduce) {
      .p-mist, .p-fire, .p-water { animation: none !important; }
    }
    .stage { position: relative; z-index: 1; }

    /* ---- 外観パネル ---- */
    .panel--left { right: auto; left: 0; transform: translateX(-105%); }
    .panel--left.open { transform: translateX(0); }
    .appearance-body { padding: 4px 22px calc(env(safe-area-inset-bottom) + 24px); overflow-y: auto; flex: 1; }
    .ap-section { padding: 18px 0; border-bottom: 1px solid var(--line); }
    .ap-section:last-child { border-bottom: none; }
    .ap-h3 { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--hint); margin-bottom: 12px; font-weight: 500; }
    .ap-swatches { display: flex; gap: 10px; }
    .ap-bg-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
    .bg-choice { display: flex; flex-direction: column; align-items: center; gap: 6px; background: transparent; border: none; cursor: pointer; padding: 2px; }
    .bg-thumb { width: 100%; aspect-ratio: 1; border-radius: 2px; border: 1px solid var(--line); overflow: hidden; transition: box-shadow .2s; }
    .bg-choice[aria-pressed="true"] .bg-thumb { box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent); }
    .bg-thumb-none { background: var(--bg2); }
    .bg-choice-label { font-size: 10px; color: var(--hint); letter-spacing: .04em; }
    .ap-upload { display: block; cursor: pointer; }
    .ap-upload-btn { width: 100%; box-sizing: border-box; }
    .ap-hint { font-size: 11.5px; color: var(--hint); line-height: 1.7; margin-top: 10px; }
    .ap-custom-status { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 10px; padding: 8px 10px; background: var(--bg2); border-radius: 2px; font-size: 12px; }
    .ap-custom-status[hidden] { display: none; }
    .ap-font-group { display: flex; gap: 8px; }
    .ap-font-btn {
      flex: 1; font-size: 12px; padding: 10px 6px; min-height: 40px; border: 1px solid var(--line);
      border-radius: 2px; background: transparent; color: var(--fg); cursor: pointer;
      transition: border-color .2s, background .2s, color .2s;
    }
    .ap-font-btn[aria-pressed="true"] { background: var(--fg); color: var(--bg); border-color: var(--fg); }
    .ap-font-btn:hover:not([aria-pressed="true"]) { border-color: var(--hint); }

    /* ---- 音楽 ---- */
    .switch-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .switch-row + .switch-row { margin-top: 14px; }
    .switch-label { font-size: 13px; color: var(--fg2); }
    .switch {
      flex: none; width: 40px; height: 22px; border-radius: 11px; border: 1px solid var(--line);
      background: var(--bg2); cursor: pointer; position: relative; padding: 0;
      transition: background .25s, border-color .25s;
    }
    .switch::after {
      content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
      border-radius: 50%; background: var(--hint); transition: transform .25s var(--ease), background .25s;
    }
    .switch[aria-checked="true"] { background: var(--accent); border-color: var(--accent); }
    .switch[aria-checked="true"]::after { transform: translateX(18px); background: #fff; }
    .vol-row { display: flex; align-items: center; gap: 12px; }
    .vol-row svg { flex: none; width: 16px; height: 16px; color: var(--hint); }
    .vol-slider { flex: 1; accent-color: var(--accent); height: 22px; cursor: pointer; }
    .track-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
    .track {
      display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
      padding: 9px 8px; min-height: 56px; border: none; border-radius: 2px; background: transparent;
      cursor: pointer; border-left: 2px solid transparent; transition: background .2s, border-color .2s;
    }
    .track:hover { background: var(--bg2); }
    .track[aria-pressed="true"] { border-left-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }
    .track-thumb { flex: none; width: 38px; height: 38px; border-radius: 2px; border: 1px solid var(--line); overflow: hidden; }
    .track-body { flex: 1; min-width: 0; }
    .track-name { display: block; font-size: 13.5px; font-weight: 500; color: var(--fg); }
    .track-desc { display: block; font-size: 11px; color: var(--hint); margin-top: 1px; }

    /* ---- ミニプレイヤー（浮遊高度=低: btn-tasksと同じ角丸・ぼかしに統一） ---- */
    .mini {
      position: fixed; z-index: 10; bottom: calc(env(safe-area-inset-bottom) + 20px);
      left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px 8px 16px; border-radius: 2px;
      background: color-mix(in srgb, var(--panel) 85%, transparent); border: 1px solid var(--line);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px var(--shadow);
      max-width: min(400px, calc(100vw - 32px));
      opacity: 1; transition: opacity .35s var(--ease), transform .35s var(--ease);
    }
    .mini.mini-hidden { opacity: 0; transform: translateX(-50%) translateY(8px); pointer-events: none; }
    .mini[hidden] { display: none; }
    .mini-info { display: flex; align-items: center; gap: 8px; min-width: 0; margin-right: 4px; }
    .mini-name { font-size: 12px; font-weight: 500; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mini-btn {
      flex: none; width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: none; border-radius: 50%; cursor: pointer; color: var(--fg2);
      transition: background .2s, color .2s;
    }
    .mini-btn:hover { background: var(--bg2); color: var(--fg); }
    .mini-btn svg { width: 16px; height: 16px; }
    .mini-btn--main { background: var(--accent); color: #0d2030; }
    .mini-btn--main:hover { background: var(--accent); opacity: .85; color: #0d2030; }
    @media (max-width: 640px) {
      .mini { bottom: calc(env(safe-area-inset-bottom) + 78px); }
    }
  </style>
</head>

<script>
'use strict';
(function () {
  /* ---------- 保存 ---------- */
  var LS_KEY = 'fugasha_focus_v1';
  var state = {
    tasks: [],            // {id, name, done, pomos, createdAt}
    selectedId: null,
    hideDone: false,
    theme: 'kinari',
    mode: 'focus',
    durations: { focus: 25 * 60, short: 5 * 60, long: 15 * 60 }, // 秒
    background: { type: 'none' }, // {type:'none'} | {type:'preset', presetId} | {type:'custom'}
    clockFont: 'serif',
    music: { trackId: null, volume: 0.7, mini: true, bgFollow: false }
  };
  function loadState() {
    try {
      var raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      var s = JSON.parse(raw);
      if (s && typeof s === 'object') {
        if (Array.isArray(s.tasks)) state.tasks = s.tasks;
        if (typeof s.selectedId === 'string') state.selectedId = s.selectedId;
        if (typeof s.hideDone === 'boolean') state.hideDone = s.hideDone;
        if (typeof s.theme === 'string') state.theme = s.theme;
        if (s.mode === 'focus' || s.mode === 'short' || s.mode === 'long') state.mode = s.mode;
        if (s.durations && typeof s.durations.focus === 'number') state.durations = s.durations;
        if (s.background && (s.background.type === 'none' || s.background.type === 'preset' || s.background.type === 'custom')) state.background = s.background;
        if (s.clockFont === 'serif' || s.clockFont === 'sans' || s.clockFont === 'mono') state.clockFont = s.clockFont;
        if (s.music && typeof s.music === 'object') {
          if (typeof s.music.trackId === 'string') state.music.trackId = s.music.trackId;
          if (typeof s.music.volume === 'number' && s.music.volume >= 0 && s.music.volume <= 1) state.music.volume = s.music.volume;
          if (typeof s.music.mini === 'boolean') state.music.mini = s.music.mini;
          if (typeof s.music.bgFollow === 'boolean') state.music.bgFollow = s.music.bgFollow;
        }
      }
    } catch (e) { /* プライベートモード等では保存なしで動作 */ }
  }
  function saveState() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) { /* 保存不可でも継続 */ }
  }

  /* ---------- 時計 ---------- */
  var elDate = document.getElementById('stDate');
  var elClock = document.getElementById('stClock');
  var WD = ['日', '月', '火', '水', '木', '金', '土'];
  function pad(n) { return String(n).padStart(2, '0'); }
  var lastClockText = '';
  function tickClock() {
    var d = new Date();
    var t = pad(d.getHours()) + ':' + pad(d.getMinutes());
    var s = pad(d.getSeconds());
    var text = t + s;
    if (text !== lastClockText) {
      lastClockText = text;
      elClock.innerHTML = '';
      elClock.appendChild(document.createTextNode(t));
      var sec = document.createElement('span');
      sec.className = 'sec';
      sec.textContent = s;
      elClock.appendChild(sec);
      elDate.textContent = d.getFullYear() + '.' + pad(d.getMonth() + 1) + '.' + pad(d.getDate()) + ' ' + WD[d.getDay()];
    }
  }
  tickClock();
  setInterval(tickClock, 250);

  /* ---------- ことば ---------- */

  var DB_NAME = 'fugasha_focus_media';
  var DB_STORE = 'bg';
  var DB_KEY = 'custom';
  function openDb() {
    return new Promise(function (resolve, reject) {
      if (!('indexedDB' in window)) { reject(new Error('no-idb')); return; }
      var req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = function () { req.result.createObjectStore(DB_STORE); };
      req.onsuccess = function () { resolve(req.result); };
      req.onerror = function () { reject(req.error); };
    });
  }
  function idbSet(record) {
    return openDb().then(function (db) {
      return new Promise(function (resolve, reject) {
        var tx = db.transaction(DB_STORE, 'readwrite');
        tx.objectStore(DB_STORE).put(record, DB_KEY);
        tx.oncomplete = function () { resolve(); };
        tx.onerror = function () { reject(tx.error); };
      });
    });
  }
  function idbGet() {
    return openDb().then(function (db) {
      return new Promise(function (resolve, reject) {
        var tx = db.transaction(DB_STORE, 'readonly');
        var req = tx.objectStore(DB_STORE).get(DB_KEY);
        req.onsuccess = function () { resolve(req.result || null); };
        req.onerror = function () { reject(req.error); };
      });
    });
  }
  function idbDelete() {
    return openDb().then(function (db) {
      return new Promise(function (resolve, reject) {
        var tx = db.transaction(DB_STORE, 'readwrite');
        tx.objectStore(DB_STORE).delete(DB_KEY);
        tx.oncomplete = function () { resolve(); };
        tx.onerror = function () { reject(tx.error); };
      });
    });
  }

  var elBgMedia = document.getElementById('bgMedia');
  var bgChoices = Array.prototype.slice.call(document.querySelectorAll('.bg-choice'));
  var elBgFileInput = document.getElementById('bgFileInput');
  var elBgHint = document.getElementById('bgHint');
  var elBgCustomStatus = document.getElementById('bgCustomStatus');
  var elBgCustomName = document.getElementById('bgCustomName');
  var elBgCustomRemove = document.getElementById('bgCustomRemove');
  var BG_HINT_DEFAULT = elBgHint.textContent;
  var currentObjectUrl = null;
  var MAX_IMAGE_DIM = 1920;
  var MAX_VIDEO_BYTES = 25 * 1024 * 1024;

  function prefersReducedMotion() {
    return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  }
  function setBgKind(kind) { document.documentElement.setAttribute('data-bg-kind', kind); }
  function setBgChoicePressed(id) {
    bgChoices.forEach(function (b) { b.setAttribute('aria-pressed', b.dataset.bg === id ? 'true' : 'false'); });
  }
  function clearBgMedia() {
    elBgMedia.innerHTML = '';
    if (currentObjectUrl) { URL.revokeObjectURL(currentObjectUrl); currentObjectUrl = null; }
  }
  function showCustomStatus(name) { elBgCustomName.textContent = name || 'カスタム背景'; elBgCustomStatus.hidden = false; }
  function hideCustomStatus() { elBgCustomStatus.hidden = true; }

  function applyBackgroundNone() {
    clearBgMedia();
    setBgKind('none');
    setBgChoicePressed('none');
    hideCustomStatus();
  }
  function applyBackgroundPreset(id) {
    clearBgMedia();
    var div = document.createElement('div');
    div.className = 'bg-preset p-' + id;
    elBgMedia.appendChild(div);
    setBgKind('preset');
    setBgChoicePressed(id);
    hideCustomStatus();
  }
  function applyBackgroundCustomBlob(blob, mime, name) {
    clearBgMedia();
    var url = URL.createObjectURL(blob);
    currentObjectUrl = url;
    var isVideo = mime.indexOf('video') === 0;
    var el = document.createElement(isVideo ? 'video' : 'img');
    el.setAttribute('aria-hidden', 'true');
    if (isVideo) {
      el.muted = true; el.loop = true; el.playsInline = true;
      el.src = url;
      if (!prefersReducedMotion()) { el.play().catch(function () {}); }
    } else {
      el.alt = '';
      el.src = url;
    }
    elBgMedia.appendChild(el);
    setBgKind('custom');
    setBgChoicePressed('');
    showCustomStatus(name);
  }
  function loadBackgroundFromState() {
    var bg = state.background;
    if (bg.type === 'preset') {
      applyBackgroundPreset(bg.presetId);
    } else if (bg.type === 'custom') {
      idbGet().then(function (rec) {
        if (rec && rec.blob) { applyBackgroundCustomBlob(rec.blob, rec.mime, rec.name); }
        else { state.background = { type: 'none' }; saveState(); applyBackgroundNone(); }
      }).catch(function () { applyBackgroundNone(); });
    } else {
      applyBackgroundNone();
    }
  }
  function applyBackgroundChoice(id) {
    if (id === 'none') { state.background = { type: 'none' }; applyBackgroundNone(); }
    else { state.background = { type: 'preset', presetId: id }; applyBackgroundPreset(id); }
  }
  bgChoices.forEach(function (b) {
    b.addEventListener('click', function () {
      applyBackgroundChoice(b.dataset.bg);
      saveState();
    });
  });
  // ホバーでライブプレビュー（stateは書き換えない・視覚のみ）→離れたら確定済みの背景に戻す（タッチ端末では無効）
  if (window.matchMedia && window.matchMedia('(hover: hover)').matches) {
    bgChoices.forEach(function (b) {
      b.addEventListener('mouseenter', function () {
        var id = b.dataset.bg;
        if (id === 'none') { applyBackgroundNone(); } else { applyBackgroundPreset(id); }
      });
      b.addEventListener('mouseleave', function () { loadBackgroundFromState(); });
    });
  }
  function compressImage(file) {
    return new Promise(function (resolve, reject) {
      var img = new Image();
      var url = URL.createObjectURL(file);
      img.onload = function () {
        var w = img.naturalWidth, h = img.naturalHeight;
        var scale = Math.min(1, MAX_IMAGE_DIM / Math.max(w, h));
        var cw = Math.max(1, Math.round(w * scale)), ch = Math.max(1, Math.round(h * scale));
        var canvas = document.createElement('canvas');
        canvas.width = cw; canvas.height = ch;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, cw, ch);
        URL.revokeObjectURL(url);
        canvas.toBlob(function (blob) {
          if (blob) resolve(blob); else reject(new Error('encode-failed'));
        }, 'image/jpeg', 0.85);
      };
      img.onerror = function () { URL.revokeObjectURL(url); reject(new Error('load-failed')); };
      img.src = url;
    });
  }
  elBgFileInput.addEventListener('change', function () {
    var file = elBgFileInput.files && elBgFileInput.files[0];
    elBgFileInput.value = '';
    if (!file) return;
    var isImage = file.type.indexOf('image') === 0;
    var isVideo = file.type.indexOf('video') === 0;
    if (!isImage && !isVideo) { elBgHint.textContent = '画像または動画ファイルを選んでください。'; return; }
    if (isVideo && file.size > MAX_VIDEO_BYTES) {
      elBgHint.textContent = '動画は25MBまでにしてください（現在: ' + Math.round(file.size / 1024 / 1024) + 'MB）。';
      return;
    }
    var proceed = isImage ? compressImage(file) : Promise.resolve(file);
    proceed.then(function (blob) {
      var mime = isImage ? 'image/jpeg' : file.type;
      return idbSet({ blob: blob, mime: mime, name: file.name }).then(function () {
        state.background = { type: 'custom' };
        saveState();
        applyBackgroundCustomBlob(blob, mime, file.name);
        elBgHint.textContent = BG_HINT_DEFAULT;
      });
    }).catch(function () {
      elBgHint.textContent = 'この画像・動画は読み込めませんでした。別のファイルでお試しください。';
    });
  });
  elBgCustomRemove.addEventListener('click', function () {
    idbDelete().catch(function () {});
    state.background = { type: 'none' };
    saveState();
    applyBackgroundNone();
  });
  document.addEventListener('visibilitychange', function () {
    var video = elBgMedia.querySelector('video');
    if (!video) return;
    if (document.hidden) { video.pause(); }
    else if (!prefersReducedMotion()) { video.play().catch(function () {}); }
  });

  /* ---------- 音楽と環境音 ----------
     音源を差し替えるには、この配列の src を変更するだけでよい。
     bg は「背景を音に合わせる」で使う背景プリセットID（none/mist/fire/water） */
  var TRACKS = [
    { id: 'lofi',      name: 'Lo-fi Focus',   desc: '集中用の落ち着いたLo-fi',     src: 'assets/audio/lofi-focus.m4a',    bg: 'mist' },
    { id: 'jazz',      name: 'Jazz Piano',    desc: '温かみのあるスロージャズ',     src: 'assets/audio/jazz-piano.m4a',    bg: 'fire' },
    { id: 'piano',     name: 'Piano Ambient', desc: '静かでミニマルなピアノ',       src: 'assets/audio/piano-ambient.m4a', bg: 'mist' },
    { id: 'fireplace', name: 'Fireplace',     desc: '暖炉の環境音',               src: 'assets/audio/fireplace.m4a',     bg: 'fire' },
    { id: 'ambient',   name: 'Ambient',       desc: '浮遊感のあるアンビエント',     src: 'assets/audio/ambient.m4a',       bg: 'water' }
  ];
  var audio = new Audio();
  audio.loop = true;
  audio.preload = 'none';
  var elTrackList = document.getElementById('trackList');
  var elMini = document.getElementById('miniPlayer');
  var elMiniName = document.getElementById('miniName');
  var elMiniPlay = document.getElementById('miniPlay');
  var elVol = document.getElementById('volSlider');
  var swMini = document.getElementById('swMini');
  var swBgFollow = document.getElementById('swBgFollow');

  function currentTrack() {
    return TRACKS.find(function (t) { return t.id === state.music.trackId; }) || null;
  }
  function renderMusic() {
    var t = currentTrack();
    var playing = !!(t && !audio.paused);
    Array.prototype.forEach.call(elTrackList.children, function (li) {
      var btn = li.firstChild;
      var sel = t && btn.dataset.track === t.id;
      btn.setAttribute('aria-pressed', sel ? 'true' : 'false');
    });
    elMini.hidden = !t;
    elMini.classList.toggle('mini-hidden', !state.music.mini);
    document.body.classList.toggle('music-active', playing);
    if (t) elMiniName.textContent = t.name;
    elMiniPlay.setAttribute('aria-label', playing ? '一時停止' : '再生');
    elMiniPlay.querySelector('.ic-play').style.display = playing ? 'none' : '';
    elMiniPlay.querySelector('.ic-pause').style.display = playing ? '' : 'none';
    swMini.setAttribute('aria-checked', state.music.mini ? 'true' : 'false');
    swBgFollow.setAttribute('aria-checked', state.music.bgFollow ? 'true' : 'false');
  }
  function followBackground(t) {
    if (!state.music.bgFollow || !t || !t.bg) return;
    if (t.bg === 'none') { state.background = { type: 'none' }; applyBackgroundNone(); }
    else { state.background = { type: 'preset', presetId: t.bg }; applyBackgroundPreset(t.bg); }
  }
  function playTrack(t) {
    if (audio.src.indexOf(t.src) === -1) { audio.src = t.src; }
    state.music.trackId = t.id;
    audio.volume = state.music.volume;
    followBackground(t);
    saveState();
    audio.play().catch(function () { renderMusic(); });
    renderMusic();
  }
  function selectTrack(t) {
    if (state.music.trackId === t.id) {
      if (audio.paused) { playTrack(t); } else { audio.pause(); }
    } else {
      playTrack(t);
    }
  }
  function stepTrack(dir) {
    var idx = TRACKS.findIndex(function (t) { return t.id === state.music.trackId; });
    var next = idx === -1 ? 0 : (idx + dir + TRACKS.length) % TRACKS.length;
    playTrack(TRACKS[next]);
  }
  // 音源リストは設定配列から組み立てる
  TRACKS.forEach(function (t) {
    var li = document.createElement('li');
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'track';
    btn.dataset.track = t.id;
    btn.setAttribute('aria-pressed', 'false');
    var thumb = document.createElement('span');
    thumb.className = 'track-thumb' + (t.bg && t.bg !== 'none' ? ' p-' + t.bg : ' bg-thumb-none');
    btn.appendChild(thumb);
    var body = document.createElement('span');
    body.className = 'track-body';
    var name = document.createElement('span');
    name.className = 'track-name';
    name.textContent = t.name;
    var desc = document.createElement('span');
    desc.className = 'track-desc';
    desc.textContent = t.desc;
    body.appendChild(name); body.appendChild(desc);
    btn.appendChild(body);
    btn.addEventListener('click', function () { selectTrack(t); });
    li.appendChild(btn);
    elTrackList.appendChild(li);
  });
  document.getElementById('miniPrev').addEventListener('click', function () { stepTrack(-1); });
  document.getElementById('miniNext').addEventListener('click', function () { stepTrack(1); });
  elMiniPlay.addEventListener('click', function () {
    var t = currentTrack();
    if (!t) return;
    if (audio.paused) { playTrack(t); } else { audio.pause(); }
  });
  elVol.addEventListener('input', function () {
    state.music.volume = Number(elVol.value);
    audio.volume = state.music.volume;
    saveState();
  });
  swMini.addEventListener('click', function () {
    state.music.mini = !state.music.mini;
    saveState(); renderMusic();
  });
  swBgFollow.addEventListener('click', function () {
    state.music.bgFollow = !state.music.bgFollow;
    saveState();
    followBackground(currentTrack());
    saveState();
    renderMusic();
  });
  audio.addEventListener('play', renderMusic);
  audio.addEventListener('pause', renderMusic);
  audio.addEventListener('error', function () {
    showNotice('音源を読み込めませんでした。時間をおいてもう一度お試しください。');
    renderMusic();
  });

  /* ---------- 初期化 ---------- */
  loadState();
  applyTheme(state.theme);
  applyClockFont(state.clockFont);
  loadBackgroundFromState();
  resetTimer();
  pickMessage(false);
  renderTasks();
  // 音楽: 前回の選択を復元（自動再生はブラウザ制限があるため行わない）
  elVol.value = String(state.music.volume);
  audio.volume = state.music.volume;
  var savedTrack = currentTrack();
  if (savedTrack) { audio.src = savedTrack.src; }
  else { state.music.trackId = null; }
  renderMusic();
})();
</script>

</body>
</html>
