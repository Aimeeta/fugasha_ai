<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI相談 | 風雅舎</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0ece4;
      --bg2: #ece6da;
      --fg: #1c1917;
      --fg2: #44403c;
      --muted: #78716c;
      --hint: #8c847e;
      --amber: #d97706;
      --amber-light: rgba(217,119,6,.10);
      --amber-mid: rgba(217,119,6,.18);
      --teal: #14b8a6;
      --glass: rgba(255,255,255,0.55);
      --border: rgba(28,25,23,0.10);
      --font-serif: 'Shippori Mincho', serif;
      --font-sans: 'Noto Sans JP', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --r-sm: 6px;
      --r-md: 12px;
      --r-lg: 20px;
      --r-xl: 28px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: #e8e3db;
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* ── Container ── */
    .container {
      width: 100%; max-width: 680px;
      position: relative; z-index: 1;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 4px;
    }
    .logo {
      font-family: var(--font-serif);
      font-size: 16px; font-weight: 500;
      color: var(--fg2); letter-spacing: .06em;
      text-decoration: none;
    }
    .back-link {
      font-size: 12px; color: var(--hint);
      text-decoration: none; letter-spacing: .04em;
      display: flex; align-items: center; gap: 4px;
      transition: color .2s;
    }
    .back-link:hover { color: var(--fg); }

    /* ── Hero card ── */
    .hero-card {
      background: var(--glass);
      border: .5px solid var(--border);
      border-radius: var(--r-xl);
      padding: 36px 40px 32px;
      backdrop-filter: blur(16px);
      text-align: center;
    }
    .hero-label {
      font-size: 10px; letter-spacing: .14em;
      color: var(--hint); font-family: var(--font-mono);
      margin-bottom: 12px;
    }
    .hero-title {
      font-family: var(--font-serif);
      font-size: clamp(22px, 4vw, 30px);
      font-weight: 500; line-height: 1.5;
      margin-bottom: 10px; color: var(--fg);
    }
    .hero-sub {
      font-size: 14px; color: var(--muted);
      line-height: 1.8; margin-bottom: 24px;
    }

    /* ── Quick starters ── */
    .starters {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center;
    }
    .starter-btn {
      font-size: 13px; color: var(--fg2);
      background: rgba(255,255,255,.7);
      border: .5px solid var(--border);
      border-radius: var(--r-pill, 99px);
      padding: 8px 16px; cursor: pointer;
      transition: all .2s; font-family: var(--font-sans);
      backdrop-filter: blur(8px);
    }
    .starter-btn:hover {
      background: rgba(255,255,255,.95);
      border-color: rgba(28,25,23,.2);
      transform: translateY(-1px);
    }

    /* ── Chat card ── */
    .chat-card {
      background: rgba(255,255,255,.75);
      border: .5px solid var(--border);
      border-radius: var(--r-xl);
      backdrop-filter: blur(20px);
      overflow: hidden;
      display: flex; flex-direction: column;
      min-height: 420px; max-height: 560px;
    }

    /* Messages area */
    .messages {
      flex: 1; overflow-y: auto;
      padding: 28px 28px 16px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(28,25,23,.1); border-radius: 99px; }

    /* ── Message bubbles ── */
    .msg { display: flex; gap: 10px; align-items: flex-end; }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
      border: .5px solid var(--border);
    }
    .msg.ai .msg-avatar {
      background: var(--amber); color: #fff;
      font-family: var(--font-serif); font-size: 13px;
    }
    .msg.user .msg-avatar {
      background: rgba(28,25,23,.07); color: var(--muted);
      font-size: 11px;
    }

    .msg-bubble {
      max-width: 82%; padding: 13px 17px;
      border-radius: 18px; line-height: 1.75;
      font-size: 14px;
    }
    .msg.ai .msg-bubble {
      background: rgba(255,255,255,.9);
      border: .5px solid var(--border);
      color: var(--fg); border-bottom-left-radius: 4px;
    }
    .msg.user .msg-bubble {
      background: var(--amber); color: #fff;
      border-bottom-right-radius: 4px;
    }

    /* Typing indicator */
    .typing { display: flex; gap: 4px; align-items: center; padding: 14px 17px; }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--hint); opacity: .4;
      animation: typingBounce .9s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: .18s; }
    .typing-dot:nth-child(3) { animation-delay: .36s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── CTA card （チャット完了後） ── */
    .cta-bubble {
      background: var(--amber-light);
      border: 1px solid var(--amber-mid);
      border-radius: var(--r-md);
      padding: 16px 18px; margin-top: 4px;
    }
    .cta-bubble-title {
      font-size: 13px; font-weight: 500;
      color: var(--fg); margin-bottom: 6px;
    }
    .cta-bubble-body {
      font-size: 12px; color: var(--muted);
      line-height: 1.7; margin-bottom: 12px;
    }
    .cta-bubble-btn {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--amber); color: #fff;
      border: none; border-radius: var(--r-sm);
      padding: 10px 20px; font-size: 13px;
      font-weight: 600; cursor: pointer;
      font-family: var(--font-sans);
      transition: transform .2s, box-shadow .2s;
    }
    .cta-bubble-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(217,119,6,.35);
    }
    .cta-bubble-note {
      font-size: 11px; color: var(--hint);
      margin-top: 8px;
    }

    /* ── Input area ── */
    .input-area {
      padding: 14px 20px 18px;
      border-top: .5px solid var(--border);
      background: rgba(255,255,255,.5);
      display: flex; gap: 10px; align-items: flex-end;
    }
    .input-wrap { flex: 1; position: relative; }
    textarea {
      width: 100%; border: .5px solid var(--border);
      border-radius: var(--r-md); padding: 11px 14px;
      font-size: 14px; font-family: var(--font-sans);
      color: var(--fg); background: rgba(255,255,255,.9);
      resize: none; outline: none; line-height: 1.6;
      min-height: 44px; max-height: 120px;
      transition: border-color .2s;
    }
    textarea::placeholder { color: var(--hint); }
    textarea:focus { border-color: var(--amber); }

    .send-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--amber); color: #fff;
      border: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s, box-shadow .2s;
      font-size: 16px;
    }
    .send-btn:hover { transform: scale(1.07); box-shadow: 0 4px 14px rgba(217,119,6,.4); }
    .send-btn:disabled { background: rgba(28,25,23,.15); cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Progress indicator ── */
    .progress-bar {
      height: 2px; background: var(--border);
      border-radius: 0 0 0 0; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--amber), var(--teal));
      border-radius: 99px; width: 0%;
      transition: width .6s cubic-bezier(.16,1,.3,1);
    }

    /* ── Note ── */
    .note {
      text-align: center; font-size: 11px;
      color: var(--hint); letter-spacing: .04em;
      padding: 0 4px;
    }

    /* ── Animations ── */
    .msg { animation: msgIn .4s cubic-bezier(.16,1,.3,1); }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }

    @media (max-width: 640px) {
      body { padding: 12px; }
      .hero-card { padding: 28px 20px 24px; }
      .messages { padding: 20px 16px 12px; }
      .input-area { padding: 12px 14px 16px; }
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <a class="logo" href="index.html">風雅舎</a>
    <a class="back-link" href="index.html">← サイトに戻る</a>
  </div>

  <!-- Hero -->
  <div class="hero-card">
    <div class="hero-label">AI CONSULTATION</div>
    <h1 class="hero-title">まず、AIに話してみてください。</h1>
    <p class="hero-sub">
      「何から手をつければいい？」その一言で大丈夫。<br>
      AIが質問しながら、あなたの状況を一緒に整理します。
    </p>
    <div class="starters">
      <button class="starter-btn" onclick="startWith('時間がなくて、やりたいことができていません')">⏱ 時間がない</button>
      <button class="starter-btn" onclick="startWith('発信やデザインがずっと後回しになっています')">✏️ 発信・デザイン</button>
      <button class="starter-btn" onclick="startWith('AIが使えそうなのはわかるけど、何から始めればいいかわかりません')">🤖 AI導入したい</button>
      <button class="starter-btn" onclick="startWith('業務の流れが属人化していて、自分がいないと回りません')">⚙️ 業務効率化</button>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-card">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="userInput"
          placeholder="気軽に話しかけてみてください…"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="送信">
        ↑
      </button>
    </div>
  </div>

  <p class="note">🔒 入力内容は外部に送信されます。個人情報は入力しないよう、ご注意ください。</p>
</div>

<script>
  const CALENDLY_URL = 'https://calendly.com/fuugasha/consultation';

  // 会話履歴
  const history = [];
  let turnCount = 0;
  let isWaiting = false;

  // システムプロンプト
  const SYSTEM = `あなたは「風雅舎」のAI相談アシスタントです。
風雅舎は、AI・デザイン・マーケティングの支援を行う個人事業主（Aimee）のサービスです。
対象：中小企業の社長・経営者。

【あなたの役割】
- 経営者の「悩み」や「困りごと」を、温かく・丁寧に・知的に聞き出す
- 1回のメッセージで聞くのは1〜2つの質問のみ。絶対に質問を詰め込まない
- 相手の言葉を受け止めてから質問する（共感→質問の順）
- 3〜4往復で課題の輪郭をつかむ
- 最後（4ターン目以降）には必ず「整理まとめ」を行い、Calendlyへの案内をする

【トーン】
- 知的・温かい・少し詩的
- 「なるほど」「それは大変でしたね」など共感フレーズを自然に使う
- 押しつけがましくない。「話してみませんか？」スタンス
- 丁寧語だが堅すぎない

【会話の流れ】
ターン1: 状況をもう少し聞く（どんな業種・規模か、何が一番きついか）
ターン2: 具体的なシーン・頻度・影響を掘り下げる
ターン3: 「理想の状態」を聞く（どうなりたいか）
ターン4以降: 整理まとめ → Calendly案内

【整理まとめの形式】
「お話を聞いて、こんな状況だと理解しました：
・〇〇
・〇〇
・〇〇

風雅舎では〇〇のようなかたちでお手伝いできると思います。
よろしければ、30分だけ話してみませんか？」

【重要】
- 最後のメッセージの末尾に、必ず次の文字列を追加する（UIがCalendlyボタンを表示するトリガー）：
  <<<SHOW_CTA>>>
- それ以外のメッセージには絶対にこの文字列を含めない`;

  // 初回メッセージ
  window.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      appendAI('こんにちは。風雅舎のAI相談窓口です。\n\n「時間が足りない」「発信できていない」「AIを使いたいけど何から？」——どんなことでも、まずは気軽に話してみてください。\n\n今、いちばん気になっていることは何ですか？');
    }, 400);
  });

  function startWith(text) {
    document.getElementById('userInput').value = text;
    autoResize(document.getElementById('userInput'));
    sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text || isWaiting) return;

    input.value = '';
    autoResize(input);
    appendUser(text);
    history.push({ role: 'user', content: text });
    turnCount++;
    updateProgress();

    isWaiting = true;
    document.getElementById('sendBtn').disabled = true;
    const typingEl = appendTyping();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: SYSTEM,
          messages: history,
        }),
      });

      const data = await res.json();
      const raw = data.content?.[0]?.text || 'すみません、少し問題が発生しました。もう一度お試しください。';

      typingEl.remove();

      const showCTA = raw.includes('<<<SHOW_CTA>>>');
      const clean = raw.replace('<<<SHOW_CTA>>>', '').trim();

      appendAI(clean, showCTA);
      history.push({ role: 'assistant', content: clean });

    } catch (e) {
      typingEl.remove();
      appendAI('接続に問題が発生しました。少し時間をおいて、もう一度お試しください。');
    }

    isWaiting = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  function appendUser(text) {
    const el = document.createElement('div');
    el.className = 'msg user';
    el.innerHTML = `
      <div class="msg-avatar">あ</div>
      <div class="msg-bubble">${escHtml(text)}</div>`;
    document.getElementById('messages').appendChild(el);
    scrollToBottom();
  }

  function appendAI(text, showCTA = false) {
    const msgs = document.getElementById('messages');

    const el = document.createElement('div');
    el.className = 'msg ai';

    const formatted = escHtml(text).replace(/\n/g, '<br>');
    let inner = `
      <div class="msg-avatar">風</div>
      <div>
        <div class="msg-bubble">${formatted}</div>`;

    if (showCTA) {
      inner += `
        <div class="cta-bubble">
          <div class="cta-bubble-title">30分、話してみませんか？</div>
          <div class="cta-bubble-body">無理な営業は一切しません。まず状況を聞かせてもらうだけで大丈夫です。</div>
          <button class="cta-bubble-btn" onclick="window.open('${CALENDLY_URL}','_blank')">
            無料で話してみる →
          </button>
          <div class="cta-bubble-note">🔒 返信は通常24時間以内 · LINEでの相談も可</div>
        </div>`;
      updateProgress(100);
    }

    inner += `</div>`;
    el.innerHTML = inner;
    msgs.appendChild(el);
    scrollToBottom();
  }

  function appendTyping() {
    const msgs = document.getElementById('messages');
    const el = document.createElement('div');
    el.className = 'msg ai';
    el.innerHTML = `
      <div class="msg-avatar">風</div>
      <div class="msg-bubble">
        <div class="typing">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>`;
    msgs.appendChild(el);
    scrollToBottom();
    return el;
  }

  function updateProgress(val) {
    const pct = val ?? Math.min(turnCount * 22, 88);
    document.getElementById('progressFill').style.width = pct + '%';
  }

  function scrollToBottom() {
    const msgs = document.getElementById('messages');
    setTimeout(() => { msgs.scrollTop = msgs.scrollHeight; }, 50);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
