<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>相談メモ | 風雅舎</title>
  <meta name="description" content="いくつかの質問に答えると、いま考えていることが一枚の相談メモになります。入力内容はどこにも送信されません。">
  <meta name="theme-color" content="#f0e6d6">
  <link rel="canonical" href="https://aimeeta.github.io/fugasha_ai/chat.html">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700&family=Noto+Serif+JP:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #f0e6d6;
      --bg2:     #e8dcc8;
      --fg:      #0d2030;
      --fg2:     #1e3a50;
      --muted:   #5a5f66;
      --hint:    #5f646c;
      --accent:  #e8866a;
      --accent2: #f0a882;
      --accent-ink: #7a4025;
      --line:    rgba(13,32,48,.1);
      --glass:   rgba(240,230,214,0.7);
      --gb:      rgba(255,255,255,0.6);
      --font-sans:  'Zen Kaku Gothic New', sans-serif;
      --font-serif: 'Noto Serif JP', serif;
      --font-mono:  'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    @view-transition { navigation: auto; }
    @media (prefers-reduced-motion: reduce) {
      ::view-transition-group(*), ::view-transition-old(*), ::view-transition-new(*) { animation: none !important; }
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      padding: 20px 16px 60px;
      display: flex; flex-direction: column; align-items: center;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
    }
    ::selection { background: rgba(232,134,106,.3); color: var(--fg); }

    .wrap { width: 100%; max-width: 620px; position: relative; z-index: 1; }
    .icn { display: inline-block; vertical-align: -0.125em; flex-shrink: 0; }

    /* ── Header ── */
    .hdr { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; margin-bottom: 20px; }
    .logo { font-family: var(--font-serif); font-size: 16px; font-weight: 500; color: var(--fg2); letter-spacing: .06em; text-decoration: none; }
    .back { font-size: 12px; color: var(--hint); text-decoration: none; transition: color .2s; padding: 8px 0; }
    .back:hover { color: var(--fg); }
    .logo:focus-visible, .back:focus-visible { outline: 2px solid var(--accent-ink); outline-offset: 3px; }

    /* ── Hero ── */
    .hero-card {
      background: rgba(255,255,255,.5);
      border: .5px solid var(--line);
      border-radius: 24px;
      padding: 34px 36px 28px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      margin-bottom: 16px;
    }
    .hero-lbl { font-size: 10px; letter-spacing: .14em; color: var(--hint); font-family: var(--font-mono); margin-bottom: 12px; }
    .hero-title {
      font-family: var(--font-serif);
      font-feature-settings: 'palt' 1;
      font-size: clamp(21px, 4vw, 27px);
      font-weight: 500; line-height: 1.55;
      color: var(--fg); margin-bottom: 10px;
    }
    .hero-sub { font-size: 13px; color: var(--muted); line-height: 1.9; }
    .hero-trust {
      margin-top: 16px; padding-top: 14px;
      border-top: .5px solid var(--line);
      font-size: 12px; color: var(--hint); line-height: 1.7;
    }

    /* ── Chat card ── */
    .chat-card {
      background: rgba(255,255,255,.5);
      border: .5px solid var(--line);
      border-radius: 24px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow: hidden;
    }
    .messages { padding: 26px 26px 8px; display: flex; flex-direction: column; gap: 16px; }

    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { justify-content: flex-end; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      background: var(--accent); color: var(--fg);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-serif); font-size: 14px; font-weight: 500;
    }
    .msg-bubble { max-width: 84%; padding: 14px 18px; font-size: 14px; line-height: 1.8; }
    .msg.host .msg-bubble {
      background: rgba(255,255,255,.7);
      border: .5px solid var(--line);
      border-radius: 4px 14px 14px 14px;
      color: var(--fg);
    }
    .msg.user .msg-bubble {
      background: rgba(232,134,106,.14);
      border: .5px solid rgba(232,134,106,.35);
      border-radius: 14px 14px 4px 14px;
      color: var(--fg);
      white-space: pre-line;
    }
    .msg-label { font-size: 10px; letter-spacing: .12em; color: var(--hint); font-family: var(--font-mono); margin-bottom: 7px; }
    .msg-title { font-family: var(--font-serif); font-size: 16px; font-weight: 500; line-height: 1.65; color: var(--fg); }
    .msg-sub { font-size: 12.5px; color: var(--muted); line-height: 1.8; margin-top: 7px; }

    .msg, .memo-card { animation: msgIn .4s cubic-bezier(.16,1,.3,1); }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Controls ── */
    .controls {
      padding: 18px 26px 22px;
      border-top: .5px solid var(--line);
      background: rgba(255,255,255,.35);
      display: flex; flex-direction: column; gap: 10px;
    }
    .controls:empty { display: none; }
    .choices { display: flex; flex-direction: column; gap: 10px; }

    .choice-btn {
      width: 100%; min-height: 44px; text-align: left;
      padding: 12px 16px;
      font-family: var(--font-sans); font-size: 14px; line-height: 1.65; color: var(--fg);
      background: rgba(255,255,255,.55);
      border: .5px solid var(--line); border-radius: 12px;
      cursor: pointer;
      transition: background .2s, border-color .2s;
    }
    .choice-btn:hover { background: rgba(255,255,255,.85); border-color: rgba(13,32,48,.25); }

    .free-input {
      width: 100%; min-height: 96px;
      padding: 12px 15px;
      border: .5px solid var(--line); border-radius: 12px;
      font-family: var(--font-sans); font-size: 14px; line-height: 1.7; color: var(--fg);
      background: rgba(255,255,255,.85);
      resize: vertical; outline: none;
      transition: border-color .2s;
    }
    .free-input:focus { border-color: var(--accent); }
    .free-input::placeholder { color: var(--hint); }

    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      min-height: 48px; padding: 13px 24px;
      background: var(--accent); color: var(--fg);
      border: none; border-radius: 2px;
      font-family: var(--font-sans); font-size: 13.5px; font-weight: 500; letter-spacing: .05em;
      cursor: pointer; text-decoration: none;
      transition: opacity .25s;
    }
    .btn-primary:hover { opacity: .8; }

    .btn-ghost {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 48px; padding: 13px 20px;
      background: transparent; color: var(--fg2);
      border: 1px solid var(--line); border-radius: 2px;
      font-family: var(--font-sans); font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .btn-ghost:hover { border-color: rgba(13,32,48,.3); color: var(--fg); }

    .back-btn {
      align-self: flex-start;
      min-height: 44px; padding: 10px 4px;
      background: none; border: none; cursor: pointer;
      font-family: var(--font-sans); font-size: 12px; color: var(--hint);
      transition: color .2s;
    }
    .back-btn:hover { color: var(--fg); }

    .choice-btn:focus-visible,
    .free-input:focus-visible,
    .btn-primary:focus-visible,
    .btn-ghost:focus-visible,
    .back-btn:focus-visible {
      outline: 2px solid var(--accent-ink); /* クリーム背景でWCAG 1.4.11の3:1を満たす */
      outline-offset: 2px;
    }
    .memo-title:focus { outline: none; } /* showMemo()からのプログラムフォーカス専用 */
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
    }

    /* ── Memo card ── */
    .memo-card {
      background: rgba(255,255,255,.72);
      border: .5px solid var(--line);
      border-radius: 16px;
      padding: 26px 28px 24px;
    }
    .memo-title {
      font-family: var(--font-serif);
      font-feature-settings: 'palt' 1;
      font-size: 20px; font-weight: 500; line-height: 1.5;
      color: var(--fg); margin-bottom: 6px;
    }
    .memo-lead { font-size: 13px; color: var(--muted); line-height: 1.8; margin-bottom: 20px; }
    .memo-list dt {
      font-size: 12px; font-weight: 500; letter-spacing: .06em;
      color: var(--accent-ink); margin-bottom: 4px;
    }
    .memo-list dd {
      font-size: 14px; color: var(--fg2); line-height: 1.85;
      white-space: pre-line;
      margin: 0 0 16px;
      padding-bottom: 16px;
      border-bottom: .5px solid var(--line);
    }
    .memo-list dd:last-of-type { border-bottom: none; padding-bottom: 4px; margin-bottom: 8px; }
    .memo-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    .copy-status { display: block; font-size: 12px; color: var(--accent-ink); min-height: 1em; margin-top: 8px; }
    .memo-hint { font-size: 12px; color: var(--hint); line-height: 1.7; margin-top: 10px; }
    .memo-note { font-size: 12px; color: var(--muted); line-height: 1.7; margin-top: 8px; }

    .copy-fallback { margin-top: 14px; }
    .copy-fallback-hint { font-size: 12px; color: var(--hint); line-height: 1.7; margin-bottom: 8px; }
    .copy-fallback textarea {
      width: 100%; padding: 12px 14px;
      border: .5px solid var(--line); border-radius: 12px;
      font-family: var(--font-sans); font-size: 13px; line-height: 1.7; color: var(--fg);
      background: rgba(255,255,255,.9);
      resize: vertical; outline: none;
    }
    .copy-fallback textarea:focus-visible { outline: 2px solid var(--accent-ink); outline-offset: 2px; }

    /* ── Note / footer ── */
    .note { text-align: center; font-size: 12px; color: var(--hint); letter-spacing: .02em; line-height: 1.8; margin-top: 14px; }
    .note a { color: inherit; }
    .ft-mini { max-width: 480px; margin: 40px auto 0; text-align: center; padding-top: 22px; border-top: 1px solid var(--line); }
    .ft-mini-tagline { font-family: var(--font-serif); font-size: 13px; letter-spacing: .03em; color: var(--fg2); margin-bottom: 6px; }
    .ft-mini-copy { font-family: var(--font-mono); font-size: 10px; color: var(--hint); letter-spacing: .08em; text-transform: uppercase; }
    .ft-mini-copy a { color: inherit; }

    @media (max-width: 560px) {
      .hero-card { padding: 26px 20px 22px; }
      .messages { padding: 20px 16px 6px; }
      .controls { padding: 16px 16px 20px; }
      .memo-card { padding: 22px 18px 20px; }
      .memo-actions { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

<div class="wrap">

  <!-- Header -->
  <header class="hdr">
    <a class="logo" href="index.html">風雅舎</a>
    <a class="back" href="index.html">← サイトに戻る</a>
  </header>

  <main>
  <!-- Hero -->
  <section class="hero-card">
    <p class="hero-lbl">CONSULTATION MEMO</p>
    <h1 class="hero-title">頭の中にあることを、<br>書き出してみてください。</h1>
    <p class="hero-sub">
      いくつかの選択肢に答えると、いま考えていることが一枚の「相談メモ」になります。
      質問は4つ。最後のひとつは自由記入で、空欄のまま進めます。
    </p>
    <p class="hero-trust">入力内容はどこにも送信されません。このページを閉じると、内容は消えます。</p>
  </section>

  <!-- Memo flow -->
  <section class="chat-card" aria-label="相談メモの作成">
    <div class="messages" id="messages" aria-live="polite">
      <div class="msg host">
        <div class="msg-avatar" aria-hidden="true">風</div>
        <div class="msg-bubble">
          <p class="msg-title" id="intro-title">いちばん近いものを、選んでみてください。</p>
          <p class="msg-sub">ここから4つの質問で、相談メモをつくります。</p>
        </div>
      </div>
    </div>
    <div class="controls" id="controls"></div>
  </section>

  <noscript>
    <p class="note">このページのメモ作成には JavaScript を使います。JavaScript なしでも、<a href="contact.html">お問い合わせ</a>からそのままご相談いただけます。</p>
  </noscript>
  </main>

  <footer class="ft-mini">
    <p class="ft-mini-tagline">Less friction. More you.</p>
    <p class="ft-mini-copy">© <span id="yr"></span> 風雅舎 FUGASHA ・ <a href="privacy.html">プライバシーポリシー</a></p>
  </footer>

</div>

<script>
(function () {
  'use strict';

  /* このページの約束:

     すべての分岐は、この下のスクリプトの中で完結する。 */

  var TOTAL = 4; // 質問数（選択3問 + 自由記入1問）。進捗表示はこの実数のみ。

  var TRACKS = {

      q3: [

      ],
      help: '業務を書き出して、AIで置き換えやすい部分を見つけるところから。プロンプトや日々の使い方まで、無理のない小さな一歩を一緒に整えられそうです。'
    },
    out: {

  var messagesEl = document.getElementById('messages');
  var controlsEl = document.getElementById('controls');

  var state = { track: null, answers: [], free: '' };
  // 進行1段ごとに追加したDOMノード群。戻る操作はここから取り消す。
  // 深さ = stepNodes.length: 0=入口 / 1=Q1 / 2=Q2 / 3=Q3 / 4=自由記入 / 5=メモ
  var stepNodes = [];

  /* ── DOMヘルパー（ユーザー入力はすべて textContent 経由。innerHTML に載せない） ── */
  function el(tag, cls, text) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text != null) n.textContent = text;
    return n;
  }

  function hostBubble(label, title, sub) {
    var wrap = el('div', 'msg host');
    var avatar = el('div', 'msg-avatar', '風');
    avatar.setAttribute('aria-hidden', 'true');
    var bubble = el('div', 'msg-bubble');
    if (label) bubble.appendChild(el('p', 'msg-label', label));
    bubble.appendChild(el('p', 'msg-title', title));
    if (sub) bubble.appendChild(el('p', 'msg-sub', sub));
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    return wrap;
  }

  function userBubble(text) {
    var wrap = el('div', 'msg user');
    wrap.appendChild(el('div', 'msg-bubble', text));
    return wrap;
  }

  function appendStep(nodes) {
    nodes.forEach(function (n) { messagesEl.appendChild(n); });
    stepNodes.push(nodes);
    // CSSの scroll-behavior に従う（reduced-motion 時は auto になる）
    nodes[nodes.length - 1].scrollIntoView({ block: 'nearest' });
  }

  function clearControls() { controlsEl.textContent = ''; }

  function focusFirstControl() {
    var target = controlsEl.querySelector('button, textarea');
    if (target) target.focus();
  }

  function backButton(label) {
    var b = el('button', 'back-btn', label || '← ひとつ前に戻る');
    b.type = 'button';
    b.addEventListener('click', goBack);
    return b;
  }

  /* ── 入口: トラック選択チップ ── */
  function renderTrackChoices(moveFocus) {
    clearControls();
    var group = el('div', 'choices');
    group.setAttribute('role', 'group');
    group.setAttribute('aria-labelledby', 'intro-title');
    TRACK_ORDER.forEach(function (key) {
      var b = el('button', 'choice-btn', TRACKS[key].chip);
      b.type = 'button';
      b.addEventListener('click', function () { startTrack(key, true); });
      group.appendChild(b);
    });
    controlsEl.appendChild(group);
    if (moveFocus) focusFirstControl();
  }

  function startTrack(key, moveFocus) {
    state.track = key;
    state.answers = [];
    state.free = '';
    appendStep([userBubble(TRACKS[key].chip), questionBubble(0)]);
    renderQuestionControls(0, moveFocus);
  }

  /* ── 質問 ── */
  function questionBubble(i) {
    var t = TRACKS[state.track];
    var label = 'Q' + (i + 1) + ' / ' + TOTAL;
    var titles = [t.q1title, Q2_TITLE, Q3_TITLE];
    var node = (i === 3)
      ? hostBubble(label, FREE_TITLE, FREE_SUB)
      : hostBubble(label, titles[i]);
    // 「Q2 / 4」はSRに意図が伝わらないため、視覚専用にして読み上げ文を併記する
    var lbl = node.querySelector('.msg-label');
    lbl.setAttribute('aria-hidden', 'true');
    lbl.parentNode.insertBefore(el('span', 'sr-only', '質問' + (i + 1) + '（全' + TOTAL + '問中）'), lbl);
    // 選択肢グループから aria-labelledby で参照する
    node.querySelector('.msg-title').id = 'q-title-' + i;
    return node;
  }

  function optionsFor(i) {
    var t = TRACKS[state.track];
    return [t.q1, t.q2, t.q3][i];
  }

  function renderQuestionControls(i, moveFocus) {
    clearControls();
    if (i === 3) { renderFreeControls(moveFocus); return; }
    var group = el('div', 'choices');
    group.setAttribute('role', 'group');
    // フォーカス通知でも質問本文が文脈として読まれるよう、本文の見出しを参照する
    group.setAttribute('aria-labelledby', 'q-title-' + i);
    optionsFor(i).forEach(function (opt) {
      var b = el('button', 'choice-btn', opt);
      b.type = 'button';
      b.addEventListener('click', function () {
        state.answers[i] = opt;
        appendStep([userBubble(opt), questionBubble(i + 1)]);
        renderQuestionControls(i + 1, true);
      });
      group.appendChild(b);
    });
    controlsEl.appendChild(group);
    controlsEl.appendChild(backButton());
    if (moveFocus) focusFirstControl();
  }

  function renderFreeControls(moveFocus) {
    clearControls();
    var ta = el('textarea', 'free-input');
    ta.rows = 4;
    ta.maxLength = 800;
    ta.placeholder = '例: 実は、いちばん気になっているのは……';
    ta.setAttribute('aria-label', '自由記入（空欄のままでも進めます）');
    var make = el('button', 'btn-primary', '相談メモをつくる');
    make.type = 'button';
    make.addEventListener('click', function () {
      state.free = ta.value.trim();
      showMemo();
    });
    controlsEl.appendChild(ta);
    controlsEl.appendChild(make);
    controlsEl.appendChild(backButton());
    if (moveFocus) focusFirstControl();
  }

  /* ── 戻る / やり直す ── */
  function goBack() {
    var nodes = stepNodes.pop();
    if (nodes) nodes.forEach(function (n) { n.remove(); });
    var depth = stepNodes.length;
    if (depth === 0) {
      state.track = null;
      state.answers = [];
      renderTrackChoices(true);
    } else {
      var qi = depth - 1;
      state.answers.length = qi;
      renderQuestionControls(qi, true);
    }
  }

  function restart() {
    stepNodes.splice(0).forEach(function (nodes) {
      nodes.forEach(function (n) { n.remove(); });
    });
    state.track = null;
    state.answers = [];
    state.free = '';
    renderTrackChoices(true);
  }

  /* ── 相談メモ ── */
  function memoItems() {
    var t = TRACKS[state.track];
    var a = state.answers;
    var talk = [
      '・「' + a[0] + '」の具体的な中身',
      '・「' + a[2] + '」に近づく、最初の一歩をどこに置くか'
    ];
    if (state.free) talk.push('・書き添えてくださったこと:「' + state.free + '」');
    return [
      ['いま困っていること', t.chip + '\nなかでも「' + a[0] + '」という状態。'],
      ['その背景', a[1] + '。'],
      ['こうなったらいい、という状態', a[2] + '。'],
      ['風雅舎で手伝えそうなこと', t.help],
      ['30分相談で話すとよさそうなこと', talk.join('\n')]
    ];
  }

  function buildMemoText() {
    return '【相談メモ】\n\n' + memoItems().map(function (item) {
      return '■ ' + item[0] + '\n' + item[1];
    }).join('\n\n') + '\n';
  }

  function copyIcon() {
    var s = el('span', 'icn-wrap');
    s.setAttribute('aria-hidden', 'true');
    s.innerHTML = '<svg class="icn" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 9.667a2.667 2.667 0 0 1 2.667 -2.667h8.666a2.667 2.667 0 0 1 2.667 2.667v8.666a2.667 2.667 0 0 1 -2.667 2.667h-8.666a2.667 2.667 0 0 1 -2.667 -2.667z"/><path d="M4.012 16.737a2 2 0 0 1 -1.012 -1.737v-10c0 -1.1 .9 -2 2 -2h10c.75 0 1.158 .385 1.5 1"/></svg>';
    return s;
  }

  function buildMemoCard() {
    var card = el('section', 'memo-card');
    card.setAttribute('aria-label', '相談メモ');
    var memoTitle = el('h2', 'memo-title', '相談メモができました。');
    memoTitle.setAttribute('tabindex', '-1'); /* 生成ボタンがDOMから消えるため、フォーカスの着地点を用意する */
    card.appendChild(memoTitle);
    card.appendChild(el('p', 'memo-lead', '答えてくださった内容を、このようにまとめました。'));

    var dl = el('dl', 'memo-list');
    memoItems().forEach(function (item) {
      dl.appendChild(el('dt', null, item[0]));
      dl.appendChild(el('dd', null, item[1]));
    });
    card.appendChild(dl);

    var actions = el('div', 'memo-actions');
    var copyBtn = el('button', 'btn-ghost');
    copyBtn.type = 'button';
    copyBtn.appendChild(copyIcon());
    copyBtn.appendChild(el('span', 'copy-label', 'メモをコピー'));
    var status = el('span', 'copy-status');
    status.setAttribute('role', 'status');
    copyBtn.addEventListener('click', function () { copyMemo(copyBtn, status, card); });
    actions.appendChild(copyBtn);

    var cta = el('a', 'btn-primary');
    cta.href = 'contact.html';
    cta.appendChild(document.createTextNode('このメモを持って、30分相談へ '));
    var arr = el('span', null, '→');
    arr.setAttribute('aria-hidden', 'true');
    cta.appendChild(arr);
    actions.appendChild(cta);

    card.appendChild(actions);
    card.appendChild(status);
    card.appendChild(el('p', 'memo-hint', 'コピーしたメモは、お問い合わせの「ひとこと」欄にそのまま貼り付けられます。'));
    card.appendChild(el('p', 'memo-note', '急かしません。メモを眺めながら、話すかどうか決めてください。'));
    return card;
  }

  function showMemo() {
    var nodes = [];
    if (state.free) nodes.push(userBubble(state.free));
    var memo = buildMemoCard();
    nodes.push(memo);
    appendStep(nodes);
    clearControls();
    var again = el('button', 'back-btn', '最初からやり直す');
    again.type = 'button';
    again.addEventListener('click', restart);
    controlsEl.appendChild(again);
    // 押下した生成ボタンは clearControls() で消えるため、フォーカスをメモ見出しへ移す
    // （移さないと activeElement が body に落ち、キーボード利用者がページ先頭へ戻される）
    memo.scrollIntoView({ block: 'start' });
    memo.querySelector('.memo-title').focus({ preventScroll: true });
  }

  /* ── コピー ── */
  var copyTimer = null;
  function copyMemo(btn, status, card) {
    var text = buildMemoText();
    var label = btn.querySelector('.copy-label');
    var done = function () {
      label.textContent = 'コピーしました';
      status.textContent = 'メモをコピーしました';
      clearTimeout(copyTimer);
      copyTimer = setTimeout(function () {
        label.textContent = 'メモをコピー';
        status.textContent = '';
      }, 2000);
    };
    var fail = function () { showCopyFallback(card, text); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, fail);
    } else {
      fail();
    }
  }

  function showCopyFallback(card, text) {
    var existing = card.querySelector('.copy-fallback textarea');
    if (existing) { existing.focus(); existing.select(); return; }
    var box = el('div', 'copy-fallback');
    box.appendChild(el('p', 'copy-fallback-hint', '自動コピーができない環境のようです。下の文章を選択して、コピーしてください。'));
    var ta = document.createElement('textarea');
    ta.readOnly = true;
    ta.rows = 10;
    ta.value = text;
    ta.setAttribute('aria-label', '相談メモの全文');
    box.appendChild(ta);
    card.insertBefore(box, card.querySelector('.memo-hint'));
    ta.focus();
    ta.select();
  }

  /* ── 初期化: ?t= で入口を事前選択（未知キー・なしはチップから） ── */
  var key = new URLSearchParams(location.search).get('t');
  if (key && Object.prototype.hasOwnProperty.call(TRACKS, key)) {
    startTrack(key, false); // ページ読み込み直後はフォーカスを奪わない
  } else {
    renderTrackChoices(false);
  }

  var yr = document.getElementById('yr');
  if (yr) yr.textContent = new Date().getFullYear();
})();
</script>
</body>
</html>
