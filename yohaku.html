  <style>

      --ease: cubic-bezier(.16,1,.3,1);

    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; transition-delay: 0ms !important; scroll-behavior: auto !important; }
    }
    html, body { min-height: 100%; }
    body {

      background: radial-gradient(60% 42% at 50% 8%, rgba(255,255,255,.42), transparent 68%), linear-gradient(180deg, #f3ece0 0%, #efe4d3 100%);

    a { color: inherit; }

    .skip-link { position: absolute; left: 16px; top: -48px; z-index: 90; background: var(--fg); color: var(--bg); padding: 10px 16px; border-radius: 0 0 4px 4px; font-size: 12px; text-decoration: none; transition: top .2s; }

    .nav { position: absolute; top: 0; left: 0; right: 0; z-index: 5; display: flex; justify-content: space-between; align-items: center; padding: calc(env(safe-area-inset-top) + 18px) 40px 16px; }

    @media (max-width: 640px) { .nav { padding-left: 20px; padding-right: 20px; } .nav-right { gap: 15px; } }

    main { position: relative; z-index: 2; }
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }
    @media (max-width: 640px) { .wrap { padding: 0 22px; } }

    /* ヒーロー */
    .hero { padding: calc(env(safe-area-inset-top) + 168px) 28px 40px; text-align: center; }
    .hero-eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: .28em; color: var(--fg2); text-transform: uppercase; }
    .hero-title { font-family: var(--font-serif); font-weight: 300; font-size: clamp(64px, 20vw, 132px); line-height: 1; letter-spacing: .08em; margin: 22px 0 0; }
    .hero-copy { font-family: var(--font-serif); font-weight: 300; font-size: clamp(14px, 2.3vw, 17px); line-height: 2.1; color: var(--fg2); max-width: 28em; margin: 34px auto 0; }

    /* 索引 */

    .entry { position: relative; display: grid; grid-template-columns: 1fr auto; gap: 22px; align-items: center; padding: 30px 6px 30px 4px; border-top: 1px solid var(--line); text-decoration: none; color: inherit; transition: padding-left .35s var(--ease); }
    .entry:last-child { border-bottom: 1px solid var(--line); }
    .entry:hover, .entry:focus-visible { padding-left: 14px; outline: none; }
    .entry:focus-visible { box-shadow: inset 3px 0 0 var(--accent-ink); }
    .entry-main { min-width: 0; }
    .entry-name { font-family: var(--font-serif); font-weight: 300; font-feature-settings: 'palt' 1; font-size: clamp(28px, 6vw, 42px); line-height: 1.2; letter-spacing: .01em; transition: color .25s var(--ease); }
    .entry:hover .entry-name, .entry:focus-visible .entry-name { color: var(--accent-ink); }
    .entry-name .en { font-family: var(--font-mono); font-size: 11px; font-weight: 400; letter-spacing: .18em; text-transform: uppercase; color: var(--hint); margin-left: 14px; vertical-align: middle; }
    .entry-role { font-size: 13px; color: var(--fg2); margin-top: 10px; line-height: 1.7; }
    .entry-state { text-align: right; white-space: nowrap; }
    .entry-state .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--hint); display: block; }
    .entry-state .val { font-family: var(--font-serif); font-weight: 300; font-size: clamp(17px, 3vw, 22px); color: var(--fg); margin-top: 5px; letter-spacing: .02em; }
    .entry-arrow { position: absolute; right: -2px; top: 50%; transform: translate(6px,-50%); opacity: 0; color: var(--accent-ink); transition: opacity .25s var(--ease), transform .25s var(--ease); }
    .entry:hover .entry-arrow, .entry:focus-visible .entry-arrow { opacity: 1; transform: translate(0,-50%); }
    .entry-arrow svg { width: 18px; height: 18px; display: block; }
    @media (hover: none) { .entry-arrow { display: none; } }
    @media (max-width: 560px) {
      .entry { grid-template-columns: 1fr; gap: 12px; }
      .entry-state { text-align: left; }
      .entry-state .val { font-size: 18px; }
    }

    /* フェードイン（fail-open） */
    .reveal { transition: opacity .8s var(--ease), transform .8s var(--ease); }
    .reveal.pre { opacity: 0; transform: translateY(14px); }
    .reveal.pre.in { opacity: 1; transform: none; }
    @media (prefers-reduced-motion: reduce) { .reveal.pre { opacity: 1; transform: none; } }

    /* フッター */
    .foot { text-align: center; padding: 44px 28px calc(env(safe-area-inset-bottom) + 72px); }

<script>
'use strict';
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var reduced = function () { return matchMedia('(prefers-reduced-motion: reduce)').matches; };
  function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
  var now = new Date();
  var pad = function (n) { return String(n).padStart(2, '0'); };
  var seed = now.getFullYear() * 372 + now.getMonth() * 31 + now.getDate(); /* words/today と共通の日替りシード */

  /* ---- Today: 月名 ---- */
  var MONTH_EN = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  function todayState() { return MONTH_EN[now.getMonth()] + ' ' + now.getDate(); }

  /* ---- Words: 本日のことばの著者（QUOTES と同順・並べ替え禁止。index = seed % 84） ---- */
  var WORDS_AUTHORS = ['老子','風雅舎','マルクス・アウレリウス','風雅舎','孔子','風雅舎','セネカ','風雅舎','松尾芭蕉','風雅舎','荘子','風雅舎','マルクス・アウレリウス','風雅舎','ソロー','風雅舎','老子','風雅舎','ファン・ゴッホ','風雅舎','鴨長明','風雅舎','エミリー・ディキンソン','風雅舎','エピクテトス','風雅舎','セネカ','風雅舎','世阿弥','風雅舎','ホイットマン','風雅舎','ゲーテ','風雅舎','マルクス・アウレリウス','風雅舎','荀子','風雅舎','吉田兼好','風雅舎','リルケ','風雅舎','老子','風雅舎','エマソン','風雅舎','松尾芭蕉','風雅舎','ヘレン・ケラー','風雅舎','荘子','風雅舎','セネカ','風雅舎','モンテーニュ','風雅舎','レオナルド・ダ・ヴィンチ','風雅舎','孔子','風雅舎','ファン・ゴッホ','風雅舎','洪自誠','風雅舎','マルクス・アウレリウス','風雅舎','ホイットマン','エミリー・ディキンソン','エピクテトス','孟子','パスカル','ゲーテ','老子','セネカ','ソロー','エマソン','レオナルド・ダ・ヴィンチ','ファン・ゴッホ','リルケ','オウィディウス','松尾芭蕉','老子','孔子','マルクス・アウレリウス'];
  function wordsState() { return '— ' + WORDS_AUTHORS[seed % WORDS_AUTHORS.length]; }

  /* ---- Sky: 今夜の月の和名（sky.html の計算・名称と同方針） ---- */
  var NIGHT_SHORT = ['新月','二日月','三日月','四日月','五日月','六日月','七日月','上弦の月','九夜月','十日夜の月','十日余の月','十二日月','十三夜月','小望月','十五夜','十六夜','立待月','居待月','寝待月','更待月','二十一日月','二十二日月','下弦の月','二十四日月','二十五日月','二十六夜','二十七日月','二十八日月','二十九日月','三十日月'];
  var RAD = Math.PI / 180, SYNODIC = 29.530588853;
  function norm360(x) { x = x % 360; return x < 0 ? x + 360 : x; }
  function toJD(ms) { return ms / 86400000 + 2440587.5; }
  function sunLon(jd) {
    var T = (jd - 2451545) / 36525;
    var L0 = 280.46646 + 36000.76983 * T + 0.0003032 * T * T;
    var M = (357.52911 + 35999.05029 * T) * RAD;
    var C = (1.914602 - 0.004817 * T) * Math.sin(M) + (0.019993) * Math.sin(2 * M) + 0.000289 * Math.sin(3 * M);
    return norm360(L0 + C);
  }
  function moonLonDeg(jd) {
    var T = (jd - 2451545) / 36525;
    var Lp = 218.3164477 + 481267.88123421 * T;
    var Dm = (297.8501921 + 445267.1114034 * T) * RAD;
    var M  = (357.5291092 + 35999.0502909 * T) * RAD;
    var Mp = (134.9633964 + 477198.8675055 * T) * RAD;
    var F  = (93.2720950 + 483202.0175233 * T) * RAD;
    return norm360(Lp + 6.288774 * Math.sin(Mp) + 1.274027 * Math.sin(2 * Dm - Mp) + 0.658314 * Math.sin(2 * Dm)
      + 0.213618 * Math.sin(2 * Mp) - 0.185116 * Math.sin(M) - 0.114332 * Math.sin(2 * F)
      + 0.058793 * Math.sin(2 * Dm - 2 * Mp) + 0.057066 * Math.sin(2 * Dm - M - Mp)
      + 0.053322 * Math.sin(2 * Dm + Mp) + 0.045758 * Math.sin(2 * Dm - M)
      - 0.040923 * Math.sin(M - Mp) - 0.034720 * Math.sin(Dm) - 0.030383 * Math.sin(M + Mp));
  }
  function elong(jd) { return norm360(moonLonDeg(jd) - sunLon(jd)); }
  function lastNewJd(jdStart) {
    var prev = elong(jdStart);
    for (var i = 1; i <= 24 * 40; i++) {
      var jd = jdStart - i / 24, cur = elong(jd);
      if (prev < 60 && cur > 300) { var a = prev, b = cur - 360; return jd + (1 / 24) * (a / (a - b)); }
      prev = cur;
    }
    return jdStart - 15;
  }
  function skyState() {
    var t = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 21, 0, 0);
    var jd = toJD(t.getTime());
    var lnj = lastNewJd(jd);
    var lnd = new Date((lnj - 2440587.5) * 86400000);
    var d0 = new Date(lnd.getFullYear(), lnd.getMonth(), lnd.getDate());
    var d1 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var night = Math.round((d1 - d0) / 86400000) + 1;
    if (night < 1) night = 1; if (night > 30) night = 30;
    return NIGHT_SHORT[night - 1];
  }

  /* ---- 索引 ---- */
  var ENTRIES = [
    { href: 'focus.html',  name: '集中',     en: 'Focus', role: '集中のための机。ポモドーロ、時計、静けさ。', label: 'いま', live: 'clock' },
    { href: 'today.html',  name: '今日',     en: 'Today', role: '今日と今月の、小さなアルマナック。', label: '今日', val: todayState() },
    { href: 'sky.html',    name: '今夜の空', en: 'Sky',   role: '月の名前、流星群、日の入り。', label: '今夜', val: skyState() },
    { href: 'words.html',  name: 'ことば',   en: 'Words', role: '出会うための、出典の確かな名言。', label: '本日のことば', val: wordsState() }
  ];
  var clockEl = null;
  (function build() {
    var ul = $('indexList');
    ENTRIES.forEach(function (e) {
      var li = document.createElement('li');
      var a = document.createElement('a');
      a.className = 'entry reveal'; a.href = e.href;
      a.setAttribute('aria-label', e.name + '（' + e.en + '） — ' + e.role);
      a.innerHTML =
        '<div class="entry-main">' +
          '<div class="entry-name">' + esc(e.name) + '<span class="en" lang="en">' + esc(e.en) + '</span></div>' +
          '<div class="entry-role">' + esc(e.role) + '</div>' +
        '</div>' +
        '<div class="entry-state"><span class="label">' + esc(e.label) + '</span><span class="val">' + esc(e.val || '') + '</span></div>' +
        '<span class="entry-arrow" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M13 6l6 6-6 6"/></svg></span>';
      if (e.live === 'clock') clockEl = a.querySelector('.val');
      li.appendChild(a); ul.appendChild(li);
    });
  })();

  /* Focus のライブ時計（分きざみ更新） */
  function renderClock() { if (clockEl) { var d = new Date(); clockEl.textContent = d.getHours() + ':' + pad(d.getMinutes()); } }
  renderClock(); setInterval(renderClock, 15000);

  $('footMeta').textContent = now.getFullYear() + '.' + pad(now.getMonth() + 1) + '.' + pad(now.getDate());

  /* エントランス（fail-open: today/sky と同方針） */
  (function reveal() {
    var els = Array.prototype.slice.call(document.querySelectorAll('.reveal'));
    if (reduced() || !('IntersectionObserver' in window)) return;
    els.forEach(function (el) { el.classList.add('pre'); });
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (en) { if (en.isIntersecting) { en.target.classList.add('in'); io.unobserve(en.target); } });
    }, { rootMargin: '0px 0px -6% 0px', threshold: 0.05 });
    els.forEach(function (el, i) { el.style.transitionDelay = Math.min(i * 70, 350) + 'ms'; io.observe(el); });
    var onScroll = function () { els.forEach(function (el) { var r = el.getBoundingClientRect(); if (r.top < window.innerHeight * 0.95 && r.bottom > 0) el.classList.add('in'); }); };
    window.addEventListener('scroll', onScroll, { passive: true });
    setTimeout(function () { els.forEach(function (el) { el.classList.add('in'); }); }, 2500);
  })();
})();
</script>
