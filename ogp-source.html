<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!--
  トップページ用OGP画像のソース (1200x630 / ネイビー基調)
  再生成: Chrome headless でこのファイルを 1200x630 でスクリーンショット → ogp.jpg
  例: chrome --headless=new --screenshot=ogp.png --window-size=1200,630 --hide-scrollbars --virtual-time-budget=8000 file://.../ogp-source.html
  配色はブログOGP (generate_ogp.py) の "ai-dx" カテゴリと同じ文法。
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500&family=Noto+Serif+JP:wght@500&display=block" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  .card {
    position: relative; width: 1200px; height: 630px; overflow: hidden;
    background: linear-gradient(45deg, #0a1a28 0%, #1c3c58 55%, #5a7a90 100%);
  }
  /* 夜明けのグロー（右下・サーモン） */
  .dawn {
    position: absolute; inset: 0;
    background: radial-gradient(60% 60% at 82% 88%, rgba(232,134,106,.22), transparent 100%);
  }
  /* 靄のような楕円 */
  .mist { position: absolute; border-radius: 50%; filter: blur(28px); }
  .m1 { left: 500px; top: 460px; width: 840px; height: 120px; background: rgba(90,122,144,.18); }
  .m2 { left: 710px; top: 390px; width: 680px; height: 100px; background: rgba(240,230,214,.12); }
  .m3 { left: -110px; top: 400px; width: 720px; height: 120px; background: rgba(200,216,226,.12); }
  .m4 { left: 320px; top: 105px; width: 560px; height: 90px; background: rgba(240,230,214,.06); }
  /* 粒子ノイズ（本サイトと同じ feTurbulence） */
  .grain {
    position: absolute; inset: 0; opacity: .045;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px;
  }
  .content { position: absolute; inset: 0; padding: 0 90px; }
  .label {
    position: absolute; left: 90px; top: 128px;
    font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 500;
    font-size: 20px; letter-spacing: 6px; color: #e8866a;
  }
  .title {
    position: absolute; left: 90px; top: 200px;
    font-family: 'Noto Serif JP', serif; font-weight: 500;
    font-size: 66px; line-height: 1.55; letter-spacing: .02em;
    color: #f0e6d6; font-feature-settings: 'palt' 1;
  }
  .brand {
    position: absolute; left: 90px; top: 540px;
    font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 400;
    font-size: 18px; letter-spacing: 4px; color: rgba(240,230,214,.6);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="dawn"></div>
    <div class="mist m1"></div>
    <div class="mist m2"></div>
    <div class="mist m3"></div>
    <div class="mist m4"></div>
    <div class="grain"></div>
    <div class="content">
      <div class="label">LESS FRICTION. MORE YOU.</div>
      <div class="title">無駄をなくして、<br>熱中を取り戻す。</div>
      <div class="brand">風雅舎 / FUGASHA</div>
    </div>
  </div>
</body>
</html>
